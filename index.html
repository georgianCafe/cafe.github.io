<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Меню</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    #slide-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      transition: opacity 0.22s ease;
    }

    /* ── Loading overlay ── */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1a1a1a;
      z-index: 50;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #7aaa52;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    .loader-text {
      font-family: sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Arrows ── */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 42px; height: 76px;
      background: rgba(0,0,0,0.42);
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: background 0.2s, color 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .arrow:hover { background: rgba(90,122,58,0.72); color: #fff; }
    .arrow:disabled { opacity: 0; pointer-events: none; }
    /* while loading — visually dim but still show */
    .arrow.loading { opacity: 0.25; pointer-events: none; }
    #aL { left:  0; border-radius: 0 6px 6px 0; }
    #aR { right: 0; border-radius: 6px 0 0 6px; }

    /* ── Dots ── */
    #dots {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 80vw;
      z-index: 10;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .dot.on    { background: #7aaa52; transform: scale(1.35); }
    .dot:hover { background: rgba(255,255,255,0.55); }
    /* dots locked while loading */
    #dots.loading { pointer-events: none; }
  </style>
</head>
<body>
<div id="app">
  <img id="slide-img" src="" alt=""/>

  <!-- Loading overlay -->
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Загрузка…</div>
  </div>

  <button class="arrow" id="aL">&#8249;</button>
  <button class="arrow" id="aR">&#8250;</button>
  <div id="dots"></div>
</div>

<script>
  const IMAGES = [
    "1.jpg",
    "2.jpg",
    "3.jpg",
    "4.jpg",
    "5.jpg",
    "6.jpg",
    "7.jpg",
    "8.jpg",
    "9.jpg",
    "10.jpg",
    "11.jpg",
    "12.jpg",
    "13.jpg",
    "14.jpg",
    "15.jpg",
  ];

  const img    = document.getElementById('slide-img');
  const aL     = document.getElementById('aL');
  const aR     = document.getElementById('aR');
  const dotsEl = document.getElementById('dots');
  const loader = document.getElementById('loader');

  const pages = IMAGES.filter(s => s && s.trim());
  let cur         = 0;
  let loading     = false; // 🔒 page-change lock
  let initialized = false;

  // ── Build dots ──
  pages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.onclick = () => go(i);
    dotsEl.appendChild(d);
  });
  if (pages.length > 30) dotsEl.style.display = 'none';

  // ── Lock / unlock UI ──
  function setLoading(state) {
    loading = state;
    aL.classList.toggle('loading', state);
    aR.classList.toggle('loading', state);
    dotsEl.classList.toggle('loading', state);
  }

  function syncDots() {
    dotsEl.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('on', i === cur)
    );
  }

  // ── Navigate ──
  function go(n) {
    if (loading) return; // 🔒 blocked while loading
    const next = Math.max(0, Math.min(pages.length - 1, n));
    if (next === cur && initialized) return;
    cur = next;

    // Show loader, fade out current image
    setLoading(true);
    loader.classList.remove('hidden');
    img.style.opacity = '0';

    // Update arrow disabled state (but keep .loading class too)
    aL.disabled = cur === 0;
    aR.disabled = cur === pages.length - 1;
    syncDots();

    // Load image
    const newImg = new Image();
    newImg.onload = () => {
      img.src = newImg.src;
      img.style.opacity = '1';
      loader.classList.add('hidden');
      setLoading(false);
      initialized = true;
    };
    newImg.onerror = () => {
      img.style.opacity = '1';
      loader.classList.add('hidden');
      setLoading(false);
      initialized = true;
    };
    newImg.src = pages[cur];
  }

  // ── Init — load first image ──
  aL.disabled = true;
  aR.disabled = pages.length <= 1;
  go(0);

  aL.onclick = () => go(cur - 1);
  aR.onclick = () => go(cur + 1);

  // Keyboard (also blocked while loading)
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });
</script>
</body>
</html>
