<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Меню</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    #slide-img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    /* ── Loader ── */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #1a1a1a;
      z-index: 50;
      pointer-events: none;
    }
    #loader.off { display: none; }

    .spinner {
      width: 46px; height: 46px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #7aaa52;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    .loader-text {
      font-family: sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Arrows ── */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 60;
      width: 42px; height: 76px;
      background: rgba(0,0,0,0.42);
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .arrow:hover    { background: rgba(90,122,58,0.72); color: #fff; }
    .arrow:disabled { opacity: 0; pointer-events: none; }
    .arrow.locked   { opacity: 0.25; pointer-events: none; }
    #aL { left:  0; border-radius: 0 6px 6px 0; }
    #aR { right: 0; border-radius: 6px 0 0 6px; }

    /* ── Dots ── */
    #dots {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 80vw;
      z-index: 60;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .dot.on    { background: #7aaa52; transform: scale(1.35); }
    .dot:hover { background: rgba(255,255,255,0.55); }
    #dots.locked { pointer-events: none; }
  </style>
</head>
<body>
<div id="app">

  <img id="slide-img" alt=""/>

  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Загрузка…</div>
  </div>

  <button class="arrow" id="aL">&#8249;</button>
  <button class="arrow" id="aR">&#8250;</button>
  <div id="dots"></div>

</div>
<script>
  const IMAGES = [
    "1.jpg",
    "2.jpg",
    "3.jpg",
    "4.jpg",
    "5.jpg",
    "6.jpg",
    "7.jpg",
    "8.jpg",
    "9.jpg",
    "10.jpg",
    "11.jpg",
    "12.jpg",
    "13.jpg",
    "14.jpg",
    "15.jpg",
  ];

  const img    = document.getElementById('slide-img');
  const loader = document.getElementById('loader');
  const aL     = document.getElementById('aL');
  const aR     = document.getElementById('aR');
  const dotsEl = document.getElementById('dots');

  let cur     = 0;
  let busy    = false;
  const total = IMAGES.length;

  // ── Build dots ──
  IMAGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', () => go(i));
    dotsEl.appendChild(d);
  });

  function syncUI() {
    // dots
    dotsEl.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('on', i === cur)
    );
    // arrows: disabled at edges, locked while busy
    aL.disabled = cur === 0;
    aR.disabled = cur === total - 1;
    aL.classList.toggle('locked', busy);
    aR.classList.toggle('locked', busy);
    dotsEl.classList.toggle('locked', busy);
  }

  function showLoader() {
    loader.classList.remove('off');
    img.style.opacity = '0';
  }

  function hideLoader() {
    loader.classList.add('off');
    img.style.opacity = '1';
  }

  function go(n) {
    if (busy) return;
    n = Math.max(0, Math.min(total - 1, n));
    if (n === cur && loader.classList.contains('off')) return;

    cur  = n;
    busy = true;
    showLoader();
    syncUI();

    // Set handlers BEFORE setting src
    img.onload = function () {
      busy = false;
      hideLoader();
      syncUI();
    };

    img.onerror = function () {
      busy = false;
      hideLoader();
      syncUI();
    };

    img.src = IMAGES[cur];
  }

  // Start
  go(0);

  aL.addEventListener('click', () => go(cur - 1));
  aR.addEventListener('click', () => go(cur + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  });
</script>
</body>
</html>
